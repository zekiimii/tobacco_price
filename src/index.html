    <script>
      // 全局变量
      let tobaccoData = [];
      let currentPage = 1;
      const itemsPerPage = 10;
      let filteredData = [];
      let priceChart = null;

      function formatMoney(value) {
        const num = Number(value);
        if (!Number.isFinite(num)) return "-";
        return `¥${num.toFixed(2)}`;
      }

      function formatDateCN(value) {
        if (!value) return "-";
        const s = String(value).trim();
        const m1 = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
        if (m1) {
          const y = Number(m1[1]);
          const m = Number(m1[2]);
          const day = Number(m1[3]);
          return `${y}年${m}月${day}日`;
        }
        const d = new Date(s);
        if (Number.isNaN(d.getTime())) return s;
        return `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日`;
      }

      function formatChangeValue(current, previous) {
        const curr = Number(current);
        const prev = Number(previous);
        if (!Number.isFinite(curr) || !Number.isFinite(prev)) return "-";
        const diff = Math.round((curr - prev) * 100) / 100;
        if (diff === 0) return "持平";
        const abs = Math.abs(diff).toFixed(2);
        return `${diff > 0 ? "+" : "-"}¥${abs}`;
      }

      function getChangeClass(changeText) {
        if (changeText === "持平" || changeText === "-") return "text-gray-500";
        return changeText.startsWith("+") ? "text-red-500" : "text-green-600";
      }

      async function getApiErrorMessage(response) {
        const statusText = `${response.status}${response.statusText ? ` ${response.statusText}` : ""}`;
        try {
          const text = await response.text();
          if (!text) return statusText;
          try {
            const data = JSON.parse(text);
            if (data && typeof data === "object") {
              if (typeof data.error === "string" && data.error.trim())
                return data.error.trim();
              if (typeof data.message === "string" && data.message.trim())
                return data.message.trim();
            }
          } catch {}
          return text;
        } catch {
          return statusText;
        }
      }

      // 从 API 加载数据
      async function loadProducts() {
        try {
          const response = await fetch("/api/products");
          if (!response.ok) {
            const details = await getApiErrorMessage(response);
            throw new Error(details || "加载失败");
          }
          const products = await response.json();

      // 应用筛选
      function applyFilters() {
        const searchTerm = searchInput.value.toLowerCase().trim();
        const minPrice = parseFloat(minPriceInput.value) || 0;
        const maxPrice = parseFloat(maxPriceInput.value) || Infinity;
        const selectedBrand = brandFilter.value;
        const sortOption = document.getElementById("sortOption").value;

        filteredData = tobaccoData.filter((item) => {
          const matchesSearch =
            !searchTerm ||
            item.brand.toLowerCase().includes(searchTerm) ||
            item.productName.toLowerCase().includes(searchTerm);

          const matchesPrice =
            item.retailPrice >= minPrice && item.retailPrice <= maxPrice;
          const matchesBrand = !selectedBrand || item.brand === selectedBrand;

          return matchesSearch && matchesPrice && matchesBrand;
        });

        // 排序
        if (sortOption === "price-asc") {
          filteredData.sort((a, b) => a.retailPrice - b.retailPrice);
        } else if (sortOption === "price-desc") {
          filteredData.sort((a, b) => b.retailPrice - a.retailPrice);
        }

        currentPage = 1;
        renderTable();
        renderPagination();
      }

              plugins: {
                legend: {
                  position: "top",
                },
                tooltip: {
                  callbacks: {
                    title: (items) => {
                      const idx = items[0].dataIndex;
                      const h = history[idx];
                      return formatDateCN(h.date);
                    },
                    label: (ctx) =>
                      `${ctx.dataset.label}: ${formatMoney(ctx.parsed.y)}`,
                  },
                },
              },
              scales: {
                y: {
                  beginAtZero: false,
                  ticks: {
                    callback: (value) => `¥${Number(value).toFixed(2)}`,
                  },
                },
              },
            },
          });
        } else {
          // 没有价格历史数据
          const ctx = document.getElementById("priceChart").getContext("2d");
          if (priceChart) {
            priceChart.destroy();
          }

          priceChart = new Chart(ctx, {
            type: "line",
            data: {
              labels: ["暂无数据"],
              datasets: [],
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: {
                legend: {
                  display: false,
                },
              },
              scales: {
                y: {
                  display: false,
                },
                x: {
                  display: false,
                },
              },
            },
          });
        }
      }

      // 关闭详情模态框
      function closeDetailModal() {
        detailModal.classList.add("hidden");
        if (priceChart) {
          priceChart.destroy();
          priceChart = null;
        }
      }

      // 显示删除模态框
      function showDeleteModal(index) {
        currentDeleteIndex = index;
        const item = filteredData[index];
        deleteProductNameElement.textContent = `${item.brand} - ${item.productName}`;
        deleteProductInfoElement.textContent = `批发价：¥${item.wholesalePrice.toFixed(2)} | 零售价：¥${item.retailPrice.toFixed(2)}`;
        deleteModal.classList.remove("hidden");
      }

      // 关闭删除模态框
      function closeDeleteModal() {
        deleteModal.classList.add("hidden");
        currentDeleteIndex = -1;
      }

      // 确认删除
      async function confirmDelete() {
        if (currentDeleteIndex >= 0) {
          const item = filteredData[currentDeleteIndex];
          try {
            const response = await fetch(`/api/products/${item.id}`, {
              method: "DELETE",
            });

            if (!response.ok) {
              const details = await getApiErrorMessage(response);
              throw new Error(details || "删除失败");
            }

            const data = await response.json().catch(() => null);
            alert(data?.message || "产品已成功删除");
            closeDeleteModal();
            closeDetailModal();
            loadProducts();
          } catch (error) {
            console.error("删除产品失败:", error);
            alert(`删除产品失败：${error?.message || "未知错误"}`);
          }
        }
      }

      function showAddPriceHistoryModal(productId) {
        priceHistoryProductId.value = productId;
        priceHistoryDate.value = "";
        priceHistoryWholesale.value = "";
        priceHistoryRetail.value = "";
        addPriceHistoryModal.classList.remove("hidden");
      }

      function closeAddPriceHistoryModalFunc() {
        addPriceHistoryModal.classList.add("hidden");
      }

      async function handleAddPriceHistory(e) {
        e.preventDefault();

        const newHistoryData = {
          product_id: parseInt(priceHistoryProductId.value),
          date: priceHistoryDate.value,
          wholesale_price: parseFloat(priceHistoryWholesale.value),
          retail_price: parseFloat(priceHistoryRetail.value),
        };

        try {
          const response = await fetch("/api/price-history", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(newHistoryData),
          });

          if (!response.ok) {
            const details = await getApiErrorMessage(response);
            throw new Error(details || "添加失败");
          }

          alert("历史价格添加成功！");
          closeAddPriceHistoryModalFunc();

          const productId = parseInt(priceHistoryProductId.value);

          // 检查新添加的历史记录是否是最新的一天
          const historyResponse = await fetch(
            `/api/products/${productId}/history`,
          );
          const historyList = await historyResponse.json();
          const isLatestHistory =
            historyList.length > 0 &&
            historyList[historyList.length - 1].date === newHistoryData.date;

          // 如果是最新的一天，则将新记录的批发价和零售价更新到产品当前价格
          if (isLatestHistory) {
            await fetch(`/api/products/${productId}`, {
              method: "PATCH",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                wholesale_price: newHistoryData.wholesale_price,
                retail_price: newHistoryData.retail_price,
              }),
            });
          }

          closeDetailModal();
          await loadProducts();
          const targetIndex = filteredData.findIndex(
            (item) => item.id === productId,
          );
          if (targetIndex >= 0) {
            await showDetail(targetIndex);
          }
        } catch (error) {
          console.error("添加历史价格失败:", error);
          alert(`添加历史价格失败：${error?.message || "未知错误"}`);
        }
      }

      function closeDeletePriceHistoryModalFunc() {
        deletePriceHistoryModal.classList.add("hidden");
      }

      function showDeletePriceHistoryModal(historyId, productId, historyItem) {
        currentDeleteHistoryId = historyId;
        currentDeleteHistoryProductId = productId;
        deletePriceHistoryInfo.textContent = `${formatDateCN(historyItem.date)} - 批发价: ${formatMoney(historyItem.wholesalePrice)} | 零售价: ${formatMoney(historyItem.retailPrice)}`;
        deletePriceHistoryModal.classList.remove("hidden");
      }

      async function confirmDeletePriceHistory() {
        if (currentDeleteHistoryId >= 0) {
          try {
            const productId = parseInt(currentDeleteHistoryProductId);

            // 先获取删除后的历史记录，用于判断是否需要更新产品当前价格
            const historyResponse = await fetch(
              `/api/products/${productId}/history`,
            );
            const historyList = await historyResponse.json();
            const deletedHistoryItem = historyList.find(
              (h) => h.id == currentDeleteHistoryId,
            );
            const isLatestHistory =
              historyList.length > 0 &&
              deletedHistoryItem &&
              historyList[historyList.length - 1].id == currentDeleteHistoryId;

            // 删除历史记录
            const response = await fetch(
              `/api/price-history/${currentDeleteHistoryId}`,
              {
                method: "DELETE",
              },
            );

            if (!response.ok) {
              const details = await getApiErrorMessage(response);
              throw new Error(details || "删除失败");
            }

            alert("历史记录已成功删除");
            closeDeletePriceHistoryModalFunc();
            console.log("删除历史记录后的历史记录的产品ID:", productId);
            // 如果删除的是最新的历史记录，则将上一条历史的批发价和零售价更新到产品当前价格
            if (isLatestHistory && historyList.length > 1) {
              const prevHistory = historyList[historyList.length - 2];
              await fetch(`/api/products/${productId}`, {
                method: "PATCH",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  wholesale_price: prevHistory.wholesale_price,
                  retail_price: prevHistory.retail_price,
                }),
              });
            }
            closeDetailModal();
            await loadProducts();
            const targetIndex = filteredData.findIndex(
              (item) => item.id === productId,
            );
            if (targetIndex >= 0) {
              await showDetail(targetIndex);
            }
          } catch (error) {
            console.error("删除历史价格失败:", error);
            alert(`删除历史价格失败：${error?.message || "未知错误"}`);
          }
        }
      }

      // 显示添加模态框
      addDataButton.addEventListener("click", () => {
        dateInput.value = new Date().toISOString().split("T")[0];
        addDataModal.classList.remove("hidden");
      });

      // 关闭添加模态框
      function closeAddModal() {
        addDataModal.classList.add("hidden");
        addDataForm.reset();
      }

      // 处理添加数据
      async function handleAddData(e) {
        e.preventDefault();

        const newData = {
          brand: brandInput.value.trim(),
          product_name: productNameInput.value.trim(),
          wholesale_price: parseFloat(wholesalePriceInput.value),
          retail_price: parseFloat(retailPriceInput.value),
        };

        if (dateInput.value) {
          newData.date = dateInput.value;
        }

        try {
          const response = await fetch("/api/products", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(newData),
          });

          if (!response.ok) {
            const details = await getApiErrorMessage(response);
            throw new Error(details || "添加失败");
          }

          alert("产品添加成功！");
          closeAddModal();
          loadProducts(); // 重新加载数据
        } catch (error) {
          console.error("添加数据失败:", error);
          alert(`添加数据失败：${error?.message || "未知错误"}`);
        }
      }

      // 页面加载时获取数据
      loadProducts();
    </script>
  </body>
</html>
